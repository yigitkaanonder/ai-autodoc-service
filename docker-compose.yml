services:
  postgres:
    image: postgres:16
    container_name: autodoc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: autodoc
      POSTGRES_PASSWORD: autodoc_pass
      POSTGRES_DB: autodoc_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: